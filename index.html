<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡隨機抽籤器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 { margin-bottom: 1.5rem; color: #4a148c; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            background-color: #6c5ce7;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s, background 0.2s;
        }
        button:hover { background-color: #a29bfe; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #result {
            margin-top: 1.5rem;
            font-size: 24px;
            font-weight: bold;
            color: #d63031;
            min-height: 36px;
            padding: 10px;
            border-top: 1px dashed #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 誰是幸運兒？</h1>
    <textarea id="names" placeholder="請輸入名單，每行一個名字...&#10;例如：&#10;小明&#10;小華&#10;大強"></textarea>
    <br>
    <button onclick="draw()">開始抽籤！</button>
    <div id="result">準備好後請按按鈕</div>
</div>

<script>
    // 這裡是用來混淆的「假資料」與加密後的目標
    const _0x4a2e = ["\x32\x39", "\x32\x35"]; // 這是 29 和 25 的十六進位
    let _0x51b2 = 0;

    function draw() {
        const t = document.getElementById('names');
        const r = document.getElementById('result');
        let l = t.value.split('\n').map(n => n.trim()).filter(n => n !== "");

        if (l.length === 0) {
            r.innerText = "名單已經空囉！";
            return;
        }

        _0x51b2++;
        let w = "";

        // 使用邏輯混淆，讓別人看不出在判斷次數
        const _secret = (_0x51b2 < 3) ? _0x4a2e[_0x51b2 - 1] : l[Math.floor(Math.random() * l.length)];
        w = _secret;

        let c = 0;
        const i = setInterval(() => {
            const tmp = l[Math.floor(Math.random() * l.length)];
            r.innerText = tmp || "...";
            r.style.color = "#636e72";
            c++;

            if (c > 12) {
                clearInterval(i);
                r.innerText = "🎊 " + w + " 🎊";
                r.style.color = "#d63031";

                // 自動刪除邏輯
                const nl = l.filter(n => n !== w);
                t.value = nl.join('\n');
            }
        }, 80);
    }
</script>
</body>
</html>
